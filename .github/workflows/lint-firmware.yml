name: lint-firmware

# Verifica que el firmware del ESP32-S3 compile en cada push/PR a main.
on:
  push:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/lint-firmware.yml"
  pull_request:
    branches: [main]
    paths:
      - "firmware/**"
      - ".github/workflows/lint-firmware.yml"

jobs:
  build:
    name: PlatformIO build (esp32s3)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio
            ~/.cache/pip
          key: pio-${{ runner.os }}-${{ hashFiles('firmware/platformio.ini') }}

      - name: Install PlatformIO Core
        run: pip install --upgrade platformio

      - name: Build firmware
        working-directory: firmware
        run: pio run --environment esp32s3
