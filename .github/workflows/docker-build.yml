name: docker-build

# Construye (y opcionalmente publica) la imagen multi-arch del gateway.
on:
  push:
    branches: [main]
    paths:
      - "gateway/**"
      - ".github/workflows/docker-build.yml"
  pull_request:
    branches: [main]
    paths:
      - "gateway/**"

jobs:
  build:
    name: buildx multi-arch (amd64 + arm64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate docker-compose
        run: docker compose -f gateway/docker-compose.yml config

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # El gateway usa imágenes oficiales (mosquitto, node-red) que ya son
      # multi-arch. Este paso valida que se pueden resolver para ambas
      # plataformas. Si en el futuro se añade un Dockerfile propio en
      # gateway/, descomenta el bloque de build/push de abajo.
      - name: Pull gateway images (amd64 + arm64)
        run: |
          for platform in linux/amd64 linux/arm64; do
            echo "::group::$platform"
            docker buildx imagetools inspect eclipse-mosquitto:2.0
            docker buildx imagetools inspect nodered/node-red:4.0
            echo "::endgroup::"
          done

