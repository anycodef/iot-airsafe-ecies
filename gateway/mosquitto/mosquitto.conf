# AirSafe-ECIES — Configuración del broker Mosquitto
# Doc: https://mosquitto.org/man/mosquitto-conf-5.html

# ─── Persistencia ───────────────────────────────────────────────────────────
persistence true
persistence_location /mosquitto/data/

# ─── Logging ────────────────────────────────────────────────────────────────
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout
log_type error
log_type warning
log_type notice
log_type information
log_timestamp true

# ─── Listener MQTT (TCP) ────────────────────────────────────────────────────
listener 1883
protocol mqtt

# ─── Listener WebSocket (para dashboards web) ───────────────────────────────
listener 9001
protocol websockets

# ─── Autenticación / autorización ───────────────────────────────────────────
# Para producción: desactiva el acceso anónimo y usa password_file + acl_file.
#   mosquitto_passwd -c /mosquitto/config/passwd airsafe
allow_anonymous true
# password_file /mosquitto/config/passwd
# acl_file      /mosquitto/config/acl

# Ejemplo de ACL (acl_file):
#   user airsafe
#   topic readwrite airsafe/#
