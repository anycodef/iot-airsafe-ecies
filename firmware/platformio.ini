; PlatformIO Project Configuration File
; AirSafe-ECIES — Nodo IoT ESP32-S3 con telemetría cifrada ECIES
; Docs: https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = esp32s3

[env:esp32s3]
platform   = espressif32
board      = esp32-s3-devkitc-1
framework  = arduino

; --- Monitor serie ---
monitor_speed = 115200
upload_speed  = 921600

; --- Flags de compilación ---
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DBOARD_HAS_PSRAM
    -std=gnu++17
build_unflags =
    -std=gnu++11

; --- Dependencias (Library Manager) ---
lib_deps =
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    adafruit/Adafruit SSD1306 @ ^2.5.13
    adafruit/Adafruit GFX Library @ ^1.11.11
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.1.0
    madhephaestus/ESP32Servo @ ^3.0.5
    miguelbalboa/MFRC522 @ ^1.4.11
    kmackay/micro-ecc @ ^1.0.0

; mbedTLS ya viene incluido en el framework Arduino-ESP32 (esp_crt / esp-idf).
